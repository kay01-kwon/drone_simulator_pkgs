# MAVROS config for PX4 SITL
/**:
  ros__parameters:
    # Connection
    # SITL: "udp://:14540@127.0.0.1:14557"
    # USB:  "/dev/ttyACM0:921600"
    # UART: "/dev/ttyTHS1:921600"
    fcu_url: "udp://:14540@127.0.0.1:14557"
    gcs_url: ""
    target_system_id: 1
    target_component_id: 1
    fcu_protocol: "v2.0"

    # TF
    local_position:
      frame_id: "map"
      tf:
        send: true
        frame_id: "map"
        child_frame_id: "base_link"

    # Startup
    conn:
      timeout: 30.0

    # Plugin enable/disable
    plugin_allowlist:
      - sys_status
      - sys_time
      - imu
      - local_position
      - global_position
      - setpoint_raw
      - setpoint_position
      - setpoint_velocity
      - setpoint_attitude
      - command
      - param
      - rc_io
      - ftp
